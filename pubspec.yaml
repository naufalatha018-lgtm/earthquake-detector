name: gempa_bumi
description: Earthquake Monitoring System with Supabase
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 🟢 SUPABASE (PENGGANTI FIREBASE)
  supabase_flutter: ^2.5.0
  
  # STATE MANAGEMENT
  provider: ^6.0.5
  
  # ROUTING
  go_router: ^14.0.0
  
  # UI
  fl_chart: ^0.66.0
  
  # AUDIO
  audioplayers: ^5.2.1
  
  # UTILS
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/alarm.mp3
    - assets/images/

