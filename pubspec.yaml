name: gempa_bumi
description: "Bhukampa Tech - Earthquake Detection IoT App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.2.1
  http: ^1.6.0
  provider: ^6.1.5+1
  fl_chart: ^1.2.0
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/alarm.mp3
    - assets/images/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"